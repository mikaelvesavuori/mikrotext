name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install Syft
        run: curl -sSfL https://get.anchore.io/syft | sudo sh -s -- -b /usr/local/bin

      - name: Install Grype
        run: curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin

      - name: Install Grant
        run: curl -sSfL https://get.anchore.io/grant | sudo sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: npm run sbom

      - name: Run vulnerability scan
        run: npm run scan

      - name: Run license check
        run: npm run licenses

      - name: Create release ZIPs
        run: npm run release:assets -- "${{ steps.version.outputs.version }}"

      - name: Upload GitHub workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mikrotext-release-${{ steps.version.outputs.version }}
          path: release/*.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/*.zip
            release/SHA256SUMS.txt

      - name: Install Wrangler
        if: ${{ vars.CLOUDFLARE_R2_BUCKET_NAME != '' }}
        run: npm install -g wrangler

      - name: Upload release assets to Cloudflare R2
        if: ${{ vars.CLOUDFLARE_R2_BUCKET_NAME != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          product="$(node -p 'require("./package.json").name')"

          for file in release/*.zip; do
            name="$(basename "$file")"
            wrangler r2 object put "${{ vars.CLOUDFLARE_R2_BUCKET_NAME }}/$name" --file="$file" --jurisdiction=eu --remote
          done

          if [ -f release/SHA256SUMS.txt ]; then
            wrangler r2 object put "${{ vars.CLOUDFLARE_R2_BUCKET_NAME }}/${product}_SHA256SUMS.txt" --file="release/SHA256SUMS.txt" --jurisdiction=eu --remote
          fi
